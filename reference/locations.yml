  # NOTE: The following are intentionally NOT fixed geodetic sensor sites and
  # are omitted as coordinates here (captured for completeness as comments):
  #   - AN/TPY-2 Forward-Based X-band: transportable (Japan, Turkey, Israel, Guam, CENTCOM); ~3,000 km range.
  #   - SBX-1 Sea-Based X-Band: mobile Pacific platform; supports GMD discrimination.
  #   - SBIRS / HBTSS / OPIR: geosynchronous & LEO space-based IR; global launch detection.
  #   - Aegis SPY-1 / SPY-6: mobile US Navy ships; sea-based BMD tracking/intercepts.
